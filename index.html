<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spots</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="pages/index.css">
</head>

<body class="page">
    <header class="header">
        <img class="header__logo" src="./images/spots_logo.svg" alt="Spots logo">
    </header>

    <main class="content">
        <section class="profile page__section">

            <img class="profile__avatar" src="./images/avatar.png" alt="A portrait of Bossie Coleman">

            <div class="profile__column">
                <h1 class="profile__name">Bossie Coleman</h1>
                <p class="profile__description">Civil Aviator</p>

                <button class="profile__edit-btn" type="button">
                    Edit Profile
                </button>
            </div>

            <button class="profile__add-btn" type="button">
                New Post
            </button>
        </section>
        <section class="cards page__section">
                <ul class="cards__list">
                    <template id="card-template">
                        <li class="card">
                            <img class="card__image" src=""
                                alt="">
                            <div class="card__description">
                                <h2 class="card__title"></h2>
                                <button class="card__like-btn" type="button">
                                </button>
                            </div>
                        </li>
                    </template>
                </ul>
        </section>
        
    </main>

    <footer class="footer content page__section">

        <p class="footer__copyright">2024 &copy; Spots</p>

    </footer>
    <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
            <button class="modal__close-btn" type="button"></button>
            <h2 class="modal__title">Edit profile</h2>
            <form class="modal__form" id="profile-form" name="edit-profile">
                <label class="modal__label" for="profile-name-input">Name
                    <input class="modal__input" id="profile-name-input" type="text" placeholder="Type your name">
                </label>
                    
                <label class="modal__label" for="profile-description-input">Description
                    <input class="modal__input" id="profile-description-input" type="text" placeholder="Describe yourself">
                </label>

                <button class="modal__submit-btn" type="submit">Save</button>
            </form>
        </div>
    </div>
    <script defer src="./scripts/index.js"></script>
</body>

</html>
