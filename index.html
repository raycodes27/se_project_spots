<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spots</title>

    <link rel="stylesheet" href="pages/index.css">
</head>
<body class="page">
    <header class="header">
    </header>

    <main class="content page__section">
        
        <section class="profile">
            <div class="profile__info">
                <img class="profile__image" src="./images/avatar.png" alt="Bossie Coleman photo">
                <div class="profile__description">
                    <h1 class="profile__title">Bessie Coleman</h1>
                    <h2 class="profile__subtitle">Civil Aviator</h2>
                </div>
                <button class="profile__edit-button" type="button">
                    <h2 class="edit-button-text">Edit profile</h2>
                </button>
            </div>
            <button class="profile__add-button" type="button">
                <div class="add-button-icon"></div>
                <h2 class="add-button-text">New Post</h2>
            </button>
        </section>

        <section class="cards">
            <ul class="cards__list">
                <li class="card">
                    <img class="card__image" src="/images/1-photo-by-moritz-feldmann-from-pexels.jpg" alt="Val Thorens photo">

                    <div class="card__description">
                        <h2 class="card__description-text">Val Thorens</h2>
                        <button class="card__like-button"type="button"></button>
                    </div>

                </li>
                <li class="card">
                    <img class="card__image" src="/images/2-photo-by-ceiline-from-pexels.jpg" alt="Restaurant terrace photo">

                    <div class="card__description">
                        <h2 class="card__description-text">Restaurant terrace</h2>
                        <button class="card__like-button"type="button"></button>
                    </div>
                    
                </li>
                <li class="card">
                    <img class="card__image" src="images/3-photo-by-tubanur-dogan-from-pexels.jpg" alt="A photo of an outdoor cafe">

                    <div class="card__description">
                        <h2 class="card__description-text">An outdoor cafe</h2>
                        <button class="card__like-button"type="button"></button>
                    </div>
                    
                </li>
                <li class="card">
                    <img class="card__image" src="images/4-photo-by-maurice-laschet-from-pexels.jpg" alt="A long bridge over the forrest photo">

                    <div class="card__description">
                        <h2 class="card__description-text">
                            A very long bridge, over the forest...
                        </h2>
                        <button class="card__like-button"type="button"></button>
                    </div>
                    
                </li>
                <li class="card">
                    <img class="card__image" src="images/5-photo-by-van-anh-nguyen-from-pexels.jpg" alt="Tunnel with morning light photo">

                    <div class="card__description">
                        <h2 class="card__description-text">Tunnel with morning light</h2>
                        <button class="card__like-button"type="button"></button>
                    </div>
                    
                </li>
                <li class="card">
                    <img class="card__image" src="images/6-photo-by-moritz-feldmann-from-pexels.jpg" alt="A house at a mountain photo">

                    <div class="card__description">
                        <h2 class="card__description-text">Mountain house</h2>
                        <button class="card__like-button"type="button"></button>
                    </div>
                    
                </li>
            </ul>
        </section>
    </main>

    <footer class="footer page__section">
        <p class="footer__copyright">2024 &copy; Spots</p>
    </footer>
</body>
</html>
