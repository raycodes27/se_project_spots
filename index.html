<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spots</title>

    <link rel="stylesheet" href="pages/index.css">
</head>

<body class="page">
    <header class="header">
        <img class="header__logo" src="./images/spots_logo.svg" alt="Spots logo">
    </header>

    <main class="content">
        <section class="profile page__section">

            <img class="profile__avatar" src="./images/avatar.png" alt="A portrait of Bossie Coleman">

            <div class="profile__column">
                <h1 class="profile__name">Bossie Coleman</h1>
                <p class="profile__description">Civil Aviator</p>

                <button class="profile__edit-button" type="button">
                    <img class="profile__edit-icon" src="./images/edit_button.svg" alt="Pencil icon">Edit Profile
                </button>
            </div>

            <button class="profile__add-button" type="button">
                <img class="profile__add-icon" src="./images/add_button.svg" alt="Plus icon">New Post
            </button>
        </section>
        <section class="cards page__section">

            <ul class="cards__list">
                <li class="card">
                    <img class="card__image" src="./images/1-photo-by-moritz-feldmann-from-pexels.jpg"
                        alt="Val Thorens">
                    <div class="card__description">
                        <h2 class="card__title">Val Thorens</h2>
                        <button class="card__like-button" type="button">
                        </button>
                    </div>
                </li>

                <li class="card">
                    <img class="card__image" src="./images/2-photo-by-ceiline-from-pexels.jpg" alt="Restaurant terrace">
                    <div class="card__description">
                        <h2 class="card__title">Restaurant terrace</h2>
                        <button class="card__like-button" type="button">
                        </button>
                    </div>
                </li>

                <li class="card">
                    <img class="card__image" src="./images/3-photo-by-tubanur-dogan-from-pexels.jpg"
                        alt="An outdoor cafe">
                    <div class="card__description">
                        <h2 class="card__title">An outdoor cafe</h2>
                        <button class="card__like-button" type="button">
                        </button>
                    </div>
                </li>

                <li class="card">
                    <img class="card__image" src="./images/4-photo-by-maurice-laschet-from-pexels.jpg"
                        alt="Long bridge over a forest">
                    <div class="card__description">
                        <h2 class="card__title">A very long bridge, over the forest...</h2>
                        <button class="card__like-button" type="button">
                        </button>
                    </div>
                </li>

                <li class="card">
                    <img class="card__image" src="./images/5-photo-by-van-anh-nguyen-from-pexels.jpg"
                        alt="A tunnel with morning light">
                    <div class="card__description">
                        <h2 class="card__title">Tunnel with morning light</h2>
                        <button class="card__like-button" type="button">
                        </button>
                    </div>
                </li>

                <li class="card">
                    <img class="card__image" src="./images/6-photo-by-moritz-feldmann-from-pexels.jpg"
                        alt="Mountain house">
                    <div class="card__description">
                        <h2 class="card__title">Mountain house</h2>
                        <button class="card__like-button" type="button">
                        </button>
                    </div>
                </li>
            </ul>
        </section>
    </main>

    <footer class="footer content page__section">
        <div class="footer__section-divider">
            <p class="footer__copyright">2024 &copy; Spots</p>
        </div>
    </footer>
</body>

</html>
